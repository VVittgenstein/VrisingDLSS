name: Build Package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-package:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore plugin
        run: dotnet restore src\VrisingDLSS.Plugin\VrisingDLSS.Plugin.csproj

      - name: Build plugin
        run: dotnet build src\VrisingDLSS.Plugin\VrisingDLSS.Plugin.csproj -c Release --no-restore

      - name: Configure native bridge
        shell: pwsh
        run: >
          cmake -S src\VrisingDLSS.Native
          -B artifacts\native-build
          -G "Visual Studio 17 2022"
          -A x64
          -DVRISINGDLSS_ENABLE_NGX_SDK_WRAPPER=OFF

      - name: Build native bridge
        run: cmake --build artifacts\native-build --config Release

      - name: Check release boundary
        shell: pwsh
        run: .\scripts\check-release-boundary.ps1

      - name: Guard chatlog reconstruction coverage
        shell: pwsh
        run: .\scripts\test-chatlog-reconstruction-coverage.ps1

      - name: Guard Phase 1 gameplay automation coverage
        shell: pwsh
        run: .\scripts\test-phase1-gameplay-automation-coverage.ps1

      - name: Guard DLSS runtime distribution gate semantics
        shell: pwsh
        run: .\scripts\test-dlss-runtime-distribution-gate-contract.ps1

      - name: Guard DLSS MVP safety gate semantics
        shell: pwsh
        run: .\scripts\test-dlss-mvp-safety-gates-contract.ps1

      - name: Guard contract-bind diagnostic stage
        shell: pwsh
        run: .\scripts\test-hdrp-dlss-contract-bind-stage.ps1 -RequirePass

      - name: Guard contract analyzer verdicts
        shell: pwsh
        run: .\scripts\test-hdrp-dlss-schedule-analyzer-contract.ps1

      - name: Guard runtime next recommendation contract
        shell: pwsh
        run: .\scripts\test-runtime-next-recommendation-contract.ps1

      - name: Guard doc next recommendation contract
        shell: pwsh
        run: .\scripts\test-doc-next-recommendation-contract.ps1

      - name: Guard runtime environment snapshot contract
        shell: pwsh
        run: .\scripts\test-runtime-environment-snapshot-contract.ps1

      - name: Guard local decompilation investigation contract
        shell: pwsh
        run: .\scripts\test-vrising-local-decompilation-investigation.ps1

      - name: Guard RenderGraph boundary route decision
        shell: pwsh
        run: .\scripts\test-rendergraph-boundary-route-status.ps1 -RequirePass

      - name: Package Thunderstore zip
        shell: pwsh
        run: .\scripts\package-thunderstore.ps1

      - name: Validate Thunderstore zip
        shell: pwsh
        run: .\scripts\validate-thunderstore-package.ps1

      - name: Report release readiness
        shell: pwsh
        run: .\scripts\get-release-readiness-status.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: VrisingDLSS-thunderstore-package
          path: dist\VrisingDLSS-*-thunderstore.zip
          if-no-files-found: error
